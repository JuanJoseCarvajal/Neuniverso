version: '3.9'

services:
  web:
    build: ../../apps/web
    container_name: neuniverso_web
    restart: always
    env_file:
      - ../../.env
    ports:
      - '3000:3000'
    depends_on:
      - api
    networks:
      - neunet

  admin:
    build: ../../apps/admin
    container_name: neuniverso_admin
    restart: always
    env_file:
      - ../../.env
    ports:
      - '3001:3000'
    networks:
      - neunet

  api:
    build: ../../services/api
    container_name: neuniverso_api
    restart: always
    env_file:
      - ../../.env
    ports:
      - '4000:4000'
    depends_on:
      - db
      - redis
    networks:
      - neunet

  db:
    image: postgres:16-alpine
    container_name: neuniverso_db
    restart: always
    environment:
      POSTGRES_DB: neuniverso
      POSTGRES_USER: neuniverso
      POSTGRES_PASSWORD: neuniverso
    volumes:
      - neuniverso_db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - neunet

  redis:
    image: redis:7-alpine
    container_name: neuniverso_redis
    restart: always
    ports:
      - '6379:6379'
    networks:
      - neunet

  nginx:
    image: nginx:alpine
    container_name: neuniverso_nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ../../infrastructure/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../infrastructure/docker/certs:/etc/letsencrypt
    depends_on:
      - web
      - admin
      - api
    networks:
      - neunet

volumes:
  neuniverso_db_data:

networks:
  neunet:
    driver: bridge
